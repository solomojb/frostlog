<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frostlog</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages workaround for client-side routing
      // Store the redirect path before reloading
      const redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
    </script>
    <script type="module" src="/frostlog/index.js"></script>
  </body>
</html>
